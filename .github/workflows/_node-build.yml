# Reusable — Node.js Build + SAST + Container Security + ECR Push + Cosign Sign
#
# Called by ci-pharma-ui.yml on develop / release/** pushes.
# Pipeline stages (all in a single job, sequential):
#   1. npm ci + ESLint      — install dependencies + lint (--max-warnings 0)
#   2. npm test             — unit tests with Jest + coverage
#   3. CodeQL               — JavaScript security-extended queries
#   4. npm audit            — fail if any HIGH/CRITICAL vulnerabilities found
#   5. Docker build         — multi-stage (Nginx, non-root)
#   6. Trivy                — image scan, fail on HIGH/CRITICAL CVEs
#   7. ECR push             — tagged as sha-<7chars>
#   8. Cosign sign          — keyless, GitHub OIDC → Fulcio CA → Rekor transparency log
#
# Outputs: image-tag (sha-<7chars>), registry (ECR registry URL)

name: Reusable — Node.js Build & Security Gates

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name (e.g. pharma-ui)"
        required: true
        type: string
      service-dir:
        description: "Service directory relative to repo root"
        required: true
        type: string
      ecr-repository:
        description: "ECR repository name"
        required: true
        type: string
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: '20'
      aws-region:
        description: "AWS region where ECR lives"
        required: false
        type: string
        default: eu-central-1
    outputs:
      image-tag:
        description: "Docker image tag pushed to ECR (format: sha-<7chars>)"
        value: ${{ jobs.build-and-push.outputs.image_tag }}
      registry:
        description: "ECR registry base URL"
        value: ${{ jobs.build-and-push.outputs.registry }}
    secrets:
      AWS_ACCOUNT_ID:
        required: true

jobs:
  build-and-push:
    name: Build · SAST · Scan · Push · Sign (${{ inputs.service-name }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # OIDC — AWS + Cosign keyless
      contents: read         # Checkout
      security-events: write # Upload SARIF (CodeQL, Trivy)
      actions: read           # Required by CodeQL action
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry:  ${{ steps.login-ecr.outputs.registry }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Derive short-SHA image tag ───────────────────────────────────────────
      - name: Set image tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ── Node.js toolchain ────────────────────────────────────────────────────
      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.service-dir }}/package-lock.json

      - name: Install dependencies
        run: cd ${{ inputs.service-dir }} && npm ci

      # ── Lint ──────────────────────────────────────────────────────────────────
      - name: ESLint (--max-warnings 0)
        run: cd ${{ inputs.service-dir }} && npx eslint src/ --ext .js,.jsx --max-warnings 0

      # ── Initialize CodeQL tracer BEFORE npm test ──────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended

      # ── Unit tests + coverage ─────────────────────────────────────────────────
      - name: npm test (Jest + coverage)
        run: cd ${{ inputs.service-dir }} && npm test -- --coverage --watchAll=false --ci
        env:
          CI: true

      - name: Upload Jest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service-name }}
          path: ${{ inputs.service-dir }}/coverage/
          retention-days: 7

      # ── CodeQL analysis ───────────────────────────────────────────────────────
      - name: CodeQL — Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript

      # ── npm audit (fail on HIGH/CRITICAL) ─────────────────────────────────────
      - name: npm audit (HIGH/CRITICAL → fail)
        run: cd ${{ inputs.service-dir }} && npm audit --audit-level=high --omit=dev


      # ── AWS credentials via OIDC (no long-lived keys) ─────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/pharma-dev-github-actions-role
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker build (multi-stage, Nginx, non-root) ───────────────────────────
      - name: Build Docker image
        id: docker-build
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}:${{ steps.meta.outputs.image_tag }}"
          cd ${{ inputs.service-dir }}
          docker build -t "$IMAGE" .
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # ── Trivy — image scan (fail on HIGH/CRITICAL CVEs) ───────────────────────
      - name: Trivy — Image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.docker-build.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.service-name }}

      # ── Push image to ECR ─────────────────────────────────────────────────────
      - name: Push image to ECR
        id: push
        run: |
          IMAGE="${{ steps.docker-build.outputs.image }}"
          docker push "$IMAGE"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE" | awk -F@ '{print $2}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Pushed: $IMAGE  (digest: $DIGEST)"

      # ── Cosign keyless sign ────────────────────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign — Sign image (keyless, GitHub OIDC → Fulcio → Rekor)
        run: |
          cosign sign --yes \
            "${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}@${{ steps.push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "true"