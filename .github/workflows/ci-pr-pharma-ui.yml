name: PR Check — pharma-ui

# Runs on feature/fix/chore branches.
# Lint + test + CodeQL + npm audit only. No Docker, no ECR, no deploy.

on:
  push:
    branches: ['feat-*', 'fix-*', 'chore-*']
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-pr-pharma-ui.yml'
      - '.github/workflows/_node-pr-check.yml'

permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

jobs:
  pr-check:
    uses: ./.github/workflows/_node-pr-check.yml
    with:
      service-name: pharma-ui
      service-dir: .
      node-version: '20'
    secrets: inherit